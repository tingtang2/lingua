# Template config, need to change dump_dir, data.root_dir and data.tokenizer.path

dump_dir: ${oc.env:LINGUA_DUMP_DIR}
name: "spike_run"
steps: 56000
probe_freq: 100
seed: 777
optim:
    lr: 0.15
    warmup: 5600
    scheduler: cosine
    cycle_length: 2.0
    lr_min_ratio: 0.0
    clip: 1.0
    lm_head:
        type: null
        lr: null
        momentum: 0.9

distributed:
    fsdp_type: full_shard
    compile: true
    model_dtype: bf16
    matmul_allow_tf32: false
    selective_activation_checkpointing: false
    tp_size: 1

model:
    dim: 1024
    n_layers: 8
    n_heads: 8
    qk_norm: false
    z_loss: false
    mu_centering: false
    vocab_chunk_size: 32768

data:
    root_dir: ${oc.env:LINGUA_DATA_ROOT}
    sources:
        fineweb_edu_10bt_shuffled: 1.0
    batch_size: 32
    prefetch_size: 512
    seq_len: 2048
    n_views: 2
    load_async: true
    tokenizer:
        name: tiktoken
        path: ${oc.env:LLAMA3_TOKENIZER_PATH}

profiling:
    run: true

checkpoint:
    dump:
        every: 100
        keep: 1
    eval:
        every: 2000
        keep: 1

logging:
    freq: 10
    light_freq: 1
    wandb_light_freq: 1
    wandb:
        entity: ${oc.env:WANDB_ENTITY}
        project: lingua_runs
        name: spike_run

eval:
  validation:
    max_steps: 1000
