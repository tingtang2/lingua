# Template config, need to change dump_dir, data.root_dir and data.tokenizer.path

dump_dir: ${oc.env:LINGUA_DUMP_DIR}
name: "debug_qk_norm_mu_centering"
steps: 1000
probe_freq: 100
seed: 777
optim:
    lr: 3e-4
    warmup: 2000
    lr_min_ratio: 0.000001
    clip: 10.0

distributed:
    fsdp_type: full_shard
    compile: true
    model_dtype: bf16
    matmul_allow_tf32: false
    selective_activation_checkpointing: false
    tp_size: 1

model:
    dim: 1024
    n_layers: 8
    n_heads: 8
    qk_norm: true
    z_loss: true
    mu_centering: true

data:
    root_dir: ${oc.env:LINGUA_DATA_ROOT}
    sources:
        fineweb_edu_10bt_shuffled: 1.0
    batch_size: 32
    prefetch_size: 64
    seq_len: 2048
    n_views: 2
    load_async: true
    tokenizer:
        name: bytes

profiling:
    run: true

checkpoint:
    dump:
        every: 100
        keep: 1

logging:
    freq: 10
    light_freq: 1
    wandb_light_freq: 1
    wandb:
        entity: ${oc.env:WANDB_ENTITY}
        project: lingua_runs
        name: debug_qk_norm_mu_centering

eval:
  validation:
    max_steps: 1000